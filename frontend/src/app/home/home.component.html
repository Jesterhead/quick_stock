<div class="home-container">
    <h1>Stock Lookup</h1>
    <input [(ngModel)]="searchQuery" placeholder="Enter stock symbol" />
    <button (click)="searchStock()">Search</button>
    
    <div *ngIf="stockData" class="stock-info">
      <p>{{ stockData.symbol }}: ${{ stockData.price }}</p>
    </div>
    <p *ngIf="error" class="error">{{ error }}</p>
  </div>
