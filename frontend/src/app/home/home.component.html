<div class="home-container">
    <h1>Stock Lookup</h1>
    <input [(ngModel)]="searchQuery" placeholder="Enter stock symbol" />
    <button (click)="searchStock()">Search</button>
    
    <div *ngIf="stockData" class="stock-info">
        <p><strong>{{ stockData.symbol }}: ${{ stockData.price }}</strong></p>
        <p>High: ${{ stockData.high }}</p>
        <p>Low: ${{ stockData.low }}</p>
        <p>Open: ${{ stockData.open }}</p>
      </div>
      
      <div *ngIf="recentSearchHistory.length > 0" class="history">
        <h3>Most Recent Searches</h3>
        <ul>
          <li *ngFor="let search of recentSearchHistory">
            {{ search.symbol }}: ${{ search.price }} - {{ search.timestamp | date:'short' }}
          </li>
        </ul>
      </div>

    <p *ngIf="error" class="error">{{ error }}</p>
  </div>
