<div class="min-h-screen bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center">
  <div class="bg-white rounded-lg shadow-2xl p-8 w-full max-w-md border-t-4 border-indigo-500">
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">Create Account</h1>
    <p class="text-center text-indigo-600 text-sm font-semibold mb-6">Join Quote Quest</p>
    
    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
        <p class="text-sm font-semibold text-blue-900 mb-2">Requirements:</p>
        <ul class="text-xs text-blue-800 space-y-1">
          <li>✓ Username: 3-20 characters (letters, numbers, underscores only)</li>
          <li>✓ Password: Min 8 characters with uppercase, lowercase, and number</li>
        </ul>
      </div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input 
          [(ngModel)]="username" 
          placeholder="3-20 characters, letters/numbers/_"
          [disabled]="loading"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 disabled:bg-gray-100"
        />
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input 
          [(ngModel)]="password" 
          type="password" 
          placeholder="Min 8 chars: uppercase, lowercase, number"
          [disabled]="loading"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 disabled:bg-gray-100"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
        <input 
          [(ngModel)]="confirmPassword" 
          type="password" 
          placeholder="Confirm password"
          [disabled]="loading"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 disabled:bg-gray-100"
        />
      </div>
      
      <button 
        (click)="register()" 
        [disabled]="loading"
        class="w-full py-2 bg-gradient-to-r from-indigo-600 to-indigo-600 text-white font-semibold rounded-lg hover:from-indigo-700 hover:to-indigo-700 transition disabled:bg-gray-400"
      >
        {{ loading ? 'Creating account...' : 'Register' }}
      </button>
    </div>
    
    <p class="text-center text-gray-600 mt-4">
        Already have an account? 
        <a routerLink="/login" class="text-indigo-600 hover:underline font-semibold">Login</a>
    </p>
    
    @if(error) {
        <p class="mt-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded">
            {{ error }}
        </p>
    }
    

    @if(success) {
        <p class="mt-4 p-3 bg-green-50 border border-green-200 text-green-700 rounded">
        {{ success }}
        </p>
    }
  </div>
</div>
