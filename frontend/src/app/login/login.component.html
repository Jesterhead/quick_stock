<div class="min-h-screen bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center">
  <div class="bg-white rounded-lg shadow-2xl p-8 w-full max-w-md">
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">Quote Quest Login</h1>
    
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input 
          [(ngModel)]="username" 
          placeholder="Enter username"
          [disabled]="loading"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 disabled:bg-gray-100"
        />
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input 
          [(ngModel)]="password" 
          type="password" 
          placeholder="Enter password"
          [disabled]="loading"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 disabled:bg-gray-100"
        />
      </div>
      
      <button 
        (click)="login()" 
        [disabled]="loading"
        class="w-full py-2 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition disabled:bg-gray-400"
      >
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </div>
    
    <p *ngIf="error" class="mt-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded">
      {{ error }}
    </p>
  </div>
</div>
