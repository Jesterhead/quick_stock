<div class="login-container">
  <h1>Login</h1>
  <div class="form-group">
    <input 
      [(ngModel)]="username" 
      placeholder="Username"
      [disabled]="loading"
    />
  </div>
  <div class="form-group">
    <input 
      [(ngModel)]="password" 
      type="password" 
      placeholder="Password"
      [disabled]="loading"
    />
  </div>
  <button (click)="login()" [disabled]="loading">
    {{ loading ? 'Logging in...' : 'Login' }}
  </button>
  <p *ngIf="error" class="error">{{ error }}</p>
</div>
